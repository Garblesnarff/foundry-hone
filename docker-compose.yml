version: "3.8"

services:
  foundry-hone:
    build: .
    container_name: foundry-hone
    ports:
      - "3459:3459"
    environment:
      - ENVIRONMENT=production
      - HONE_PORT=3459
    volumes:
      - foundry-hone-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3459/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  foundry-hone-data:
